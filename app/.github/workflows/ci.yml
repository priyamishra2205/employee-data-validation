name: FastAPI CI
 
on:
  push:
    branches:
      - main
 
  pull_request:
    branches:
      - main
 
jobs:
  build:
 
    runs-on: ubuntu-latest
 
    steps:
 
    - name: Checkout Code
      uses: actions/checkout@v4
 
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
 
    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
 
    - name: Check Python Syntax
      run: |
        python -m py_compile app/main.py